<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refer Erin Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --tg-theme-bg-color: #f4f7f9;
            --primary-gradient: linear-gradient(135deg, #248bcf 0%, #005a92 100%);
            --accent-color: #ff9800;
            --glass-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            margin: 0;
            padding: 0;
            color: #2c3e50;
            user-select: none;
        }

        /* Top Header Section */
        .header {
            background: var(--primary-gradient);
            padding: 30px 20px 60px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .header h2 { margin: 0; font-size: 1.2rem; opacity: 0.9; }
        .balance-container { margin-top: 10px; }
        .balance-amount { font-size: 3rem; font-weight: 800; letter-spacing: -1px; }
        .balance-label { font-size: 0.9rem; text-transform: uppercase; opacity: 0.8; }

        /* Main Content Container */
        .content {
            margin: -40px 15px 100px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Premium Buttons */
        .btn-main {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(36, 139, 207, 0.3);
            transition: transform 0.2s;
        }

        .btn-main:active { transform: scale(0.98); }

        .btn-ad {
            background: white;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            padding: 12px;
            width: 100%;
            border-radius: 15px;
            font-weight: 700;
            margin-top: 10px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Bottom Navigation */
        .nav-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #fff;
            height: 65px;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #95a5a6;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .nav-item.active { color: #248bcf; }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }

        /* Referral Link Box */
        .refer-box {
            background: #edf2f7;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 0.85rem;
            word-break: break-all;
            margin: 10px 0;
            border: 1px dashed #cbd5e0;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="user-name">Hello, Explorer</h2>
        <div class="balance-container">
            <div class="balance-amount" id="bal">0</div>
            <div class="balance-label">Total Coins Earned</div>
        </div>
    </div>

    <div class="content">
        <div class="card">
            <button class="btn-main" onclick="claimBonus()">
                <i class="fas fa-gift"></i> Claim Daily Reward
            </button>
        </div>

        <div class="card" style="border-left: 5px solid var(--accent-color);">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span style="font-weight: bold; color: #e67e22;"><i class="fas fa-crown"></i> SPONSORED TASKS</span>
                <span style="font-size: 0.7rem; background: #fff3e0; color: #e67e22; padding: 2px 8px; border-radius: 10px;">Bonus Active</span>
            </div>
            <p style="font-size: 0.85rem; color: #7f8c8d; margin-bottom: 15px;">Visit our official partner to unlock extra rewards instantly.</p>
            <a href="https://horizontallyresearchpolar.com/g1wajyi32d?key=98b95e4c7b29a083b3ce18c6145d5eb6" target="_blank" class="btn-ad">
                <i class="fas fa-external-link-alt"></i> VISIT & EARN NOW
            </a>
        </div>

        <div class="card">
            <h3 style="margin-top:0"><i class="fas fa-users"></i> Invite Friends</h3>
            <p style="font-size: 0.85rem; color: #7f8c8d;">Share your link and get 50 coins for each friend who joins.</p>
            <div class="refer-box" id="ref-link">https://t.me/Refer_Erin_bot?start=...</div>
            <button class="btn-main" style="background: #27ae60;" onclick="copyLink()">
                <i class="fas fa-copy"></i> Copy Referral Link
            </button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="#" class="nav-item" onclick="tg.showAlert('Coming Soon!')"><i class="fas fa-tasks"></i>Tasks</a>
        <a href="#" class="nav-item" onclick="tg.showAlert('Coming Soon!')"><i class="fas fa-wallet"></i>Wallet</a>
        <a href="#" class="nav-item" onclick="tg.showAlert('Coming Soon!')"><i class="fas fa-cog"></i>Settings</a>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDpufywuRxIYbOFWWR2HDYdN_SDSrzvGnU",
            authDomain: "refer-erin.firebaseapp.com",
            projectId: "refer-erin",
            storageBucket: "refer-erin.firebasestorage.app",
            messagingSenderId: "98263622377",
            appId: "1:98263622377:web:365ad476abf6a0e20a4678"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const tg = window.Telegram.WebApp;
        tg.expand();

        const uid = tg.initDataUnsafe.user.id.toString();
        const firstName = tg.initDataUnsafe.user.first_name;

        document.getElementById('user-name').innerText = `Hello, ${firstName}!`;
        document.getElementById('ref-link').innerText = `https://t.me/Refer_Erin_bot?start=${uid}`;

        // Live Balance Sync
        db.collection('users').doc(uid).onSnapshot(doc => {
            if(doc.exists) {
                document.getElementById('bal').innerText = doc.data().balance;
            }
        });

        async function claimBonus() {
            const userRef = db.collection('users').doc(uid);
            const doc = await userRef.get();
            const now = Date.now();
            if (now - (doc.data().lastBonus || 0) > 86400000) {
                await userRef.update({ balance: firebase.firestore.FieldValue.increment(10), lastBonus: now });
                tg.showPopup({ message: "Success! 10 Coins added to your wallet." });
            } else {
                tg.showPopup({ message: "Bonus already claimed. Try again in 24 hours!" });
            }
        }

        function copyLink() {
            const link = document.getElementById('ref-link').innerText;
            navigator.clipboard.writeText(link);
            tg.showAlert("Link copied to clipboard!");
        }
    </style>
</body>
</html>
